    <!-- Verifications (replace with your codes when you register) -->
    <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_SEARCH_CONSOLE_CODE" />

    <!-- JSON-LD Organization (server-rendered so Googlebot sees it even without JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Logoviking",
      "alternateName": "Logoviking.com",
      "url": "https://logoviking.com",
      "logo": "https://logoviking.com/images/logoviking-helmet-logo.png",
      "description": "All-in-one Creator + Designer + SEO toolkit platform with 60+ free tools.",
      "foundingDate": "2026",
      "sameAs": [
        "https://twitter.com/logoviking",
        "https://www.instagram.com/logoviking",
        "https://www.youtube.com/@logoviking"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "url": "https://logoviking.com/contact",
        "availableLanguage": ["English","Spanish","Portuguese","French","German","Russian","Arabic"]
      }
    }
    </script>

    <!-- JSON-LD WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Logoviking",
      "url": "https://logoviking.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://logoviking.com/tools?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Logoviking Toolkit",
      "url": "https://logoviking.com",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "120"
      }
    }
    </script>
